name: Sync to Hugging Face
on:
  push:
    branches: [main] # o master, controlla come si chiama il tuo branch principale


  # Permette di avviare il sync anche manualmente
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://xmignax:$HF_TOKEN@huggingface.co/spaces/xmignax/EasyProxy main
